<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knight Security - Access Denied</title>

  <style>
    :root {
      --b: #000;
      --c: #0a0a0a;
      --t: #f0f0f0;
      --d: #888;
      --r: #ff0000;
      --s: #111;
      --bd: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui;
      background: var(--b);
      color: var(--t);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      line-height: 1.6;
    }

    .card {
      background: var(--c);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 3rem;
      max-width: 28rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px #000;
    }

    .header {
      font-size: 1.1rem;
      color: var(--d);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      color: var(--r);
      margin-bottom: 1.25rem;
      font-weight: 600;
    }

    .msg {
      color: #ccc;
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }

    #blocked-url {
      background: var(--s);
      border: 1px solid var(--bd);
      padding: 1.25rem;
      font-family: monospace;
      font-size: .95rem;
      color: var(--t);
      border-radius: 8px;
      margin-bottom: 2.5rem;
      word-break: break-all;
    }

    .btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 1rem;
      font: inherit;
      font-weight: 500;
      border: 1px solid;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      min-width: 140px;
    }

    #btn-back {
      background: 0;
      color: var(--d);
      border-color: var(--bd);
    }

    #btn-back:hover {
      background: var(--s);
      color: var(--t);
      border-color: #555;
    }

    #btn-proceed {
      background: var(--r);
      color: #000;
      border-color: var(--r);
      font-weight: 600;
    }

    #btn-proceed:hover {
      background: #cc0000;
      border-color: var(--r);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(255, 0, 0, .5);
    }

    @media (max-width: 480px) {
      .btns {
        flex-direction: column;
      }

      .card {
        margin: 1rem;
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">Knight Security</div>
    <h1>Access Denied</h1>
    <p class="msg">Site blocked due to security policy violation.</p>
    <div id="blocked-url">[RESTRICTED DOMAIN]</div>
    <div class="btns">
      <button id="btn-back">Return</button>
      <button id="btn-proceed">Continue</button>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
